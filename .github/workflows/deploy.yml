name: Deploy Backend

on:
  push:
    branches:
      - main
#to help auto deploy
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: mellow
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/mellow/rms
            git pull
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart rms
